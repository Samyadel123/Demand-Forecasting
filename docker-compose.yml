  #     SERVICE_PRECONDITION: "hdfs-namenode:8020"
  #     CORE_CONF_fs_defaultFS: "hdfs://hdfs-namenode:8020"
  #     CORE_CONF_hadoop_http_staticuser_user_name: "root"
  #     CORE_CONF_hadoop_proxyuser_root_groups: "*"
  #     CORE_CONF_hadoop_proxyuser_root_hosts: "*"
  #     HDFS_CONF_dfs_datanode_http___bind___host: "0.0.0.0"
  #     HDFS_CONF_dfs_datanode_address: "0.0.0.0:50010"
  #     HDFS_CONF_dfs_datanode_ipc___address: "0.0.0.0:50020"
  #   depends_on:
