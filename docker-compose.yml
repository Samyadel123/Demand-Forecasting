version: "3.8"
 
services:
 
  # ─────────────────────────────────────────────
  # MinIO  — S3-compatible object storage
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - minio_net
 
  # ─────────────────────────────────────────────
  # mc (MinIO Client)  — one-shot init container
  # Creates the "raw" bucket and loads the
  # Kaggle dataset via the Kaggle CLI.
  # ─────────────────────────────────────────────
  mc:
    image: minio/mc:latest
    container_name: mc_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
    volumes:
      - ./scripts/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - minio_net
 
  # ─────────────────────────────────────────────
  # Kaggle downloader — dedicated service that
  # downloads the dataset and uploads to MinIO.
  # Runs once on startup (restart: on-failure
  # lets it retry if MinIO isn't ready yet).
  # ─────────────────────────────────────────────
  kaggle_loader:
    image: python:3.11-bookworm
    container_name: kaggle_loader
    restart: on-failure
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT: http://minio:9000
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
      DATASET_SLUG: felixzhao/productdemandforecasting
      BUCKET_NAME: raw
    volumes:
      - ./scripts/load_dataset.py:/load_dataset.py:ro
      - kaggle_data:/tmp/kaggle
    command: >
      bash -c "python -m pip install --quiet --no-cache-dir kaggle boto3 python-dotenv &&
               python /load_dataset.py"
    networks:
      - minio_net
  # 2. Spark Master Node
  spark-master:
    image: bitnamilegacy/spark:3.5.1-debian-12-r8
    container_name: spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark Master URL
    networks:
      - minio_net

  # 3. Spark Worker Node (Scale this up later if needed)
  spark-worker:
    image: bitnamilegacy/spark:3.5.1-debian-12-r8
    container_name: spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - minio_net

  # ─────────────────────────────────────────────
  # HDFS NameNode — Hadoop Distributed File System
  # Tracks metadata and manages file system
  # ─────────────────────────────────────────────
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.3.4-java11
    container_name: hdfs_namenode
    restart: unless-stopped
    environment:
      CLUSTER_NAME: "demand-forecast-cluster"
      CORE_CONF_fs_defaultFS: "hdfs://hdfs-namenode:8020"
      CORE_CONF_hadoop_http_staticuser_user_name: "root"
      CORE_CONF_hadoop_proxyuser_root_groups: "*"
      CORE_CONF_hadoop_proxyuser_root_hosts: "*"
      HDFS_CONF_dfs_namenode_rpc___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_namenode_servicerpc___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_namenode_http___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_namenode_https___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_replication: "2"
    ports:
      - "9870:9870"   # NameNode Web UI
      - "8020:8020"   # NameNode RPC
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    networks:
      - minio_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # HDFS DataNode 1 — Stores actual data blocks
  # ─────────────────────────────────────────────
  hdfs-datanode-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.4-java11
    container_name: hdfs_datanode_1
    restart: unless-stopped
    environment:
      SERVICE_PRECONDITION: "hdfs-namenode:8020"
      CORE_CONF_fs_defaultFS: "hdfs://hdfs-namenode:8020"
      CORE_CONF_hadoop_http_staticuser_user_name: "root"
      CORE_CONF_hadoop_proxyuser_root_groups: "*"
      CORE_CONF_hadoop_proxyuser_root_hosts: "*"
      HDFS_CONF_dfs_datanode_http___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_datanode_address: "0.0.0.0:50010"
      HDFS_CONF_dfs_datanode_ipc___address: "0.0.0.0:50020"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    ports:
      - "9864:9864"   # DataNode Web UI
    volumes:
      - hdfs_datanode_1:/hadoop/dfs/data
    networks:
      - minio_net

  # ─────────────────────────────────────────────
  # HDFS DataNode 2 — For replication
  # ─────────────────────────────────────────────
  hdfs-datanode-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.4-java11
    container_name: hdfs_datanode_2
    restart: unless-stopped
    environment:
      SERVICE_PRECONDITION: "hdfs-namenode:8020"
      CORE_CONF_fs_defaultFS: "hdfs://hdfs-namenode:8020"
      CORE_CONF_hadoop_http_staticuser_user_name: "root"
      CORE_CONF_hadoop_proxyuser_root_groups: "*"
      CORE_CONF_hadoop_proxyuser_root_hosts: "*"
      HDFS_CONF_dfs_datanode_http___bind___host: "0.0.0.0"
      HDFS_CONF_dfs_datanode_address: "0.0.0.0:50010"
      HDFS_CONF_dfs_datanode_ipc___address: "0.0.0.0:50020"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    ports:
      - "9865:9864"   # DataNode Web UI
    volumes:
      - hdfs_datanode_2:/hadoop/dfs/data
    networks:
      - minio_net

  # ─────────────────────────────────────────────
  # HDFS Init — Initialize directories and perms
  # ─────────────────────────────────────────────
  hdfs-init:
    image: bde2020/hadoop-base:2.0.0-hadoop3.3.4-java11
    container_name: hdfs_init
    restart: "no"
    environment:
      HADOOP_VERSION: "3.3.4"
    depends_on:
      hdfs-namenode:
        condition: service_healthy
      hdfs-datanode-1:
        condition: service_started
      hdfs-datanode-2:
        condition: service_started
    volumes:
      - ./scripts/hdfs_init.sh:/hdfs_init.sh:ro
    entrypoint: ["/bin/bash", "/hdfs_init.sh"]
    networks:
      - minio_net

  # 4. Workspace for EDA & Modeling
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter_workspace
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
      - jupyter_ivy_cache:/home/jovyan/.ivy2/cache
    depends_on:
      - minio
      - spark-master
    networks:
      - minio_net

  pipeline_runner:
    image: demand-forecasting-pipeline:latest
    container_name: pipeline_runner
    profiles: ["tool"]
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/.venv
      - spark_ivy_cache:/root/.ivy2.5.2/cache
    env_file:
      - .env
    environment:
      # Tells Python where to look for your modules (infrastructure, processing, etc.)
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - HDFS_NAMENODE=hdfs-namenode
      - HDFS_PORT=8020
      - PATH=/app/.venv/bin:$PATH
    networks:
      - minio_net
    working_dir: /app
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
      hdfs-namenode:
        condition: service_healthy

 
volumes:
  minio_data:
    driver: local
  kaggle_data:
    driver: local
  spark_ivy_cache:
  jupyter_ivy_cache:
  hdfs_namenode:
    driver: local
  hdfs_datanode_1:
    driver: local
  hdfs_datanode_2:
    driver: local
 
networks:
  minio_net:
    driver: bridge