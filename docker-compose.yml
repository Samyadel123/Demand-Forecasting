  # ─────────────────────────────────────────────
  # HDFS Init — Initialize directories and perms
  # ─────────────────────────────────────────────
  # hdfs-init:
  #   image: bitnami/hadoop-datanode:3
  #   container_name: hdfs_init
  #   restart: "no"
  #   environment:
  #     HADOOP_VERSION: "3.3.4"
  #   depends_on:
  #     hdfs-namenode:
  #       condition: service_healthy
  #     hdfs-datanode-1:
  #       condition: service_started
  #     hdfs-datanode-2:
  #       condition: service_started
  #   volumes:
  #     - ./scripts/hdfs_init.sh:/hdfs_init.sh:ro
  #   entrypoint: ["/bin/bash", "/hdfs_init.sh"]
  #   networks:
  #     - minio_net

  # 4. Workspace for EDA & Modeling
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter_workspace
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
      - spark_ivy_cache:/home/jovyan/.ivy2
    depends_on:
      - minio
      - spark-master
    networks:
      - minio_net

  pipeline_runner:
    image: demand-forecasting-pipeline:latest
    container_name: pipeline_runner
    profiles: ["tool"]
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - venv_cache:/app/.venv
      - spark_ivy_cache:/root/.ivy2
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      # - HDFS_NAMENODE=hdfs-namenode
      - HDFS_PORT=8020
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_TRACKING_URI=http://mlflow_tracking:5000
      - PATH=/app/.venv/bin:$PATH
    networks:
      - minio_net
    working_dir: /app
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
      # hdfs-namenode:
      #   condition: service_healthy
      mlflow:
        condition: service_healthy

  api:
    image: demand-forecasting-pipeline:latest
    container_name: resynor_api
    profiles: ["tool"]
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=http://mlflow_tracking:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - minio_net
    working_dir: /app

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow_tracking
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root s3://mlflow/ --allowed-hosts "localhost,localhost:5000,mlflow_tracking,mlflow_tracking:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - minio_net
 
volumes:
  minio_data:
    driver: local
  kaggle_data:
    driver: local
  spark_ivy_cache:
  hdfs_namenode:
    driver: local
  hdfs_datanode_1:
    driver: local
  hdfs_datanode_2:
    driver: local
  venv_cache:
  mlflow_data:
 
networks:
  minio_net:
    driver: bridge
